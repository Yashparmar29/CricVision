{% extends "base.html" %}
{% block title %}Sign Up - CricVision AI{% endblock %}

{% block content %}
<style>
    /* ===== Animated Background ===== */
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(-45deg, #141e30, #243b55, #1f1c2c, #0f2027);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        overflow: hidden;
    }

    @keyframes gradientMove {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    /* ===== Glass Container ===== */
    .auth-container {
        width: 420px;
        padding: 45px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(25px);
        background: rgba(255, 255, 255, 0.06);
        border-radius: 25px;
        box-shadow: 0 0 60px rgba(0, 255, 255, 0.15);
        text-align: center;
        animation: fadeSlide 1s ease forwards;
        opacity: 0;
    }

    @keyframes fadeSlide {
        from {
            transform: translate(-50%, -40%);
            opacity: 0;
        }

        to {
            transform: translate(-50%, -50%);
            opacity: 1;
        }
    }

    .auth-container h1 {
        color: #ffffff;
        margin-bottom: 30px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    /* ===== Form ===== */
    .auth-form {
        display: flex;
        flex-direction: column;
    }

    .form-group {
        position: relative;
        margin-bottom: 25px;
    }

    .form-group input {
        width: 100%;
        padding: 16px 45px 16px 16px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 14px;
        color: #ffffff;
        outline: none;
        font-size: 15px;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #00ffff;
        box-shadow: 0 0 15px #00ffff;
    }

    /* Floating Labels */
    .form-group label {
        position: absolute;
        top: 50%;
        left: 16px;
        transform: translateY(-50%);
        color: #ccc;
        font-size: 14px;
        pointer-events: none;
        transition: 0.3s;
    }

    .form-group input:focus+label,
    .form-group input:not(:placeholder-shown)+label {
        top: -8px;
        left: 12px;
        font-size: 12px;
        background: rgba(20, 30, 48, 0.8);
        padding: 0 6px;
        border-radius: 6px;
        color: #00ffff;
    }

    /* Password Toggle */
    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
        font-size: 13px;
    }

    /* Password Strength */
    .strength {
        height: 5px;
        width: 100%;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        margin-top: 8px;
        overflow: hidden;
    }

    .strength span {
        display: block;
        height: 100%;
        width: 0%;
        transition: 0.3s;
    }

    /* Button */
    .auth-btn {
        padding: 15px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: 0.4s;
        margin-top: 10px;
    }

    .auth-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px #00c6ff;
    }

    .auth-btn:active {
        transform: scale(0.97);
    }

    /* Links */
    .auth-links {
        margin-top: 20px;
        color: #ccc;
        font-size: 14px;
    }

    .auth-links a {
        color: #00c6ff;
        text-decoration: none;
        font-weight: 500;
    }

    .auth-links a:hover {
        text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
        .auth-container {
            width: 90%;
            padding: 30px;
        }
    }
</style>

<div class="auth-container">
    <h1>Join CricVision AI</h1>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" class="auth-form">

        <div class="form-group">
            <input type="text" name="username" placeholder=" " required autocomplete="off">
            <label>Choose a Username</label>
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder=" " required autocomplete="off">
            <label>Email Address</label>
        </div>

        <div class="form-group">
            <input type="tel" name="mobile" placeholder=" " required autocomplete="off" pattern="[0-9]{10}">
            <label>Mobile Number (10 digits)</label>
        </div>

        <div class="form-group">
            <input type="password" name="password" id="password" placeholder=" " required autocomplete="off"
                onkeyup="checkStrength()">
            <label>Create a Password</label>
            <span class="toggle-password" onclick="togglePassword()">Show</span>
            <div class="strength"><span id="strength-bar"></span></div>
        </div>

        <div class="form-group">
            <input type="password" name="confirm_password" id="confirm" placeholder=" " required autocomplete="off">
            <label>Confirm Password</label>
        </div>

        <button type="submit" class="auth-btn">
            Create Account
        </button>

    </form>

    <div class="auth-links">
        Already have an account?
        <a href="{{ url_for('login') }}">Sign In</a>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");
        const toggleText = document.querySelector(".toggle-password");

        if (passwordField.type === "password") {
            passwordField.type = "text";
            toggleText.textContent = "Hide";
        } else {
            passwordField.type = "password";
            toggleText.textContent = "Show";
        }
    }

    function checkStrength() {
        const password = document.getElementById("password").value;
        const bar = document.getElementById("strength-bar");
        let strength = 0;

        if (password.length > 5) strength += 25;
        if (password.match(/[A-Z]/)) strength += 25;
        if (password.match(/[0-9]/)) strength += 25;
        if (password.match(/[^A-Za-z0-9]/)) strength += 25;

        bar.style.width = strength + "%";

        if (strength <= 25) bar.style.background = "red";
        else if (strength <= 50) bar.style.background = "orange";
        else if (strength <= 75) bar.style.background = "yellow";
        else bar.style.background = "lime";
    }
</script>

{% endblock %}
