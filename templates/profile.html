{% extends "base.html" %}
{% block title %}Profile - CricVision AI{% endblock %}

{% block content %}

<style>
    /* ===== FIX FOR FIXED NAVBAR ===== */
    body {
        padding-top: 90px;
        /* Adjust if your navbar height is different */
    }

    /* ===== PROFILE CONTAINER ===== */
    .profile-container {
        max-width: 600px;
        margin: 4rem auto;
        background: var(--bg-panel);
        backdrop-filter: blur(16px);
        padding: 3rem;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.6s ease;
    }

    /* Decorative Gradient Glow */
    .profile-container::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
        z-index: 0;
        pointer-events: none;
    }

    .profile-container>* {
        position: relative;
        z-index: 1;
    }

    /* ===== HEADER ===== */
    .profile-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .profile-avatar {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        margin: 0 auto 1.5rem;
        box-shadow: 0 10px 25px var(--accent-glow);
        transition: transform 0.3s ease;
    }

    .profile-avatar:hover {
        transform: scale(1.05);
    }

    .profile-header h1 {
        font-size: 2.2rem;
        margin: 0;
        background: linear-gradient(135deg, var(--text-main), var(--text-muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* ===== DETAILS SECTION ===== */
    .profile-details {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .detail-item {
        background: rgba(0, 0, 0, 0.2);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
    }

    .detail-item:hover {
        transform: translateX(10px);
        background: rgba(16, 185, 129, 0.05);
        border-color: rgba(16, 185, 129, 0.2);
    }

    .detail-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .detail-value {
        color: var(--text-main);
        font-size: 1.1rem;
        font-weight: 500;
    }

    /* ===== BUTTON ===== */
    .profile-actions {
        margin-top: 3rem;
        text-align: center;
    }

    .btn-edit {
        display: inline-block;
        padding: 0.8rem 2.5rem;
        background: linear-gradient(135deg, var(--accent-primary), #059669);
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-edit:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6);
    }

    /* ===== ANIMATION ===== */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
        .profile-container {
            margin: 2rem 1rem;
            padding: 2rem;
        }

        .detail-item {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
        }
    }
</style>

<div class="profile-container">
    <div class="profile-header">
        <div class="profile-avatar">
            👤
        </div>
        <h1>{{ user.username }}</h1>
    </div>

    <div class="profile-details">
        <div class="detail-item">
            <span class="detail-label">Username</span>
            <span class="detail-value">{{ user.username }}</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">Email Address</span>
            <span class="detail-value">{{ user.email }}</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">Mobile Number</span>
            <span class="detail-value">{{ user.mobile }}</span>
        </div>
    </div>

    <div class="profile-actions">
        <a href="{{ url_for('dashboard') }}" class="btn-edit">
            Back to Dashboard
        </a>
    </div>
</div>

{% endblock %}
